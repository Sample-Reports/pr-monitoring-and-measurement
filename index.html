<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoVision Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F5F7FA;color:#101828;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:48px}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:22px;height:22px}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.01em;color:#101828}
.logo-name span{color:#667085;font-weight:500}
.card{background:#fff;border:1px solid #DFE5EC;border-radius:20px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 16px rgba(0,0,0,.04)}
.icon{width:52px;height:52px;border-radius:14px;background:#F5F7FA;border:1px solid #DFE5EC;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:22px}
h1{font-size:20px;font-weight:700;color:#101828;margin-bottom:10px;letter-spacing:-.01em}
p{font-size:13.5px;color:#667085;line-height:1.7}
.footer{margin-top:32px;font-size:11px;color:#98A2B3}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-mark">
    <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="8" height="8" rx="2" fill="#fff" opacity=".9"/>
      <rect x="12" y="2" width="8" height="8" rx="2" fill="#fff" opacity=".6"/>
      <rect x="2" y="12" width="8" height="8" rx="2" fill="#fff" opacity=".6"/>
      <rect x="12" y="12" width="8" height="8" rx="2" fill="#fff" opacity=".3"/>
    </svg>
  </div>
  <div class="logo-name">InfoVision <span>Intelligence</span></div>
</div>

<div class="card">
  <div class="icon">🔒</div>
  <h1>Access requires a direct link</h1>
  <p>This portal is accessible only via a personalised link provided by your InfoVision account team. Please check your email or contact us to receive your link.</p>
</div>

<div class="footer">InfoVision Intelligence &nbsp;·&nbsp; Confidential</div>
</body>
</html>
